<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Lannent</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <a href="/" class="logo-link">
                    <span class="logo-text">Lannent<span class="logo-accent">.</span></span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-items">
                    <a href="#" class="sidebar-item" data-page="dashboard">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span class="label">Dashboard</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="projects">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 2H5a2 2 0 0 0-2 2v4m0 0v10a2 2 0 0 0 2 2h4m0 0h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-4m0 0v4"></path>
                        </svg>
                        <span class="label">My Projects</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="post-task">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        <span class="label">Post Task</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="hire-workers">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span class="label">Hire Workers</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="applications">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span class="label">Worker Applications</span>
                        <span class="badge">3</span>
                    </a>
                    <a href="#" class="sidebar-item active" data-page="messages">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span class="label">Messages</span>
                        <span class="badge">3</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="wallet">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                            <path d="M1 10h22"></path>
                        </svg>
                        <span class="label">Wallet</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="analytics">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="2" x2="12" y2="22"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <span class="label">Analytics</span>
                    </a>
                    <a href="#" class="sidebar-item" data-page="settings">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-15.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24"></path>
                        </svg>
                        <span class="label">Settings</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="collapse-btn" id="collapseBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-content">
                    <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" class="search-input" placeholder="Search projects, tasks, or messages...">
                    </div>

                    <div class="navbar-actions">
                        <div class="notification-container">
                            <button class="icon-button" id="notificationBtn">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                                </svg>
                                <span class="notification-dot"></span>
                            </button>
                        </div>

                        <button class="icon-button">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span class="notification-dot" style="background-color: #3b82f6;"></span>
                        </button>

                        <div class="user-menu-container">
                            <button class="user-button" id="userMenuBtn">
                                <div class="user-avatar">JD</div>
                                <span class="user-name">John Doe</span>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="main-content">
                <div class="content-wrapper messages-wrapper">
                    <!-- Header -->
                    <div class="page-header">
                        <h1 class="page-title">Messages</h1>
                        <p class="page-subtitle">Communicate with clients and freelancers in real time.</p>
                    </div>

                    <!-- Three-Panel Layout -->
                    <div class="messages-container">
                        <!-- LEFT PANEL - Conversations List -->
                        <div class="conversations-panel">
                            <div class="conversations-search">
                                <svg class="search-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                                <input
                                    type="text"
                                    id="searchInput"
                                    placeholder="Search conversations..."
                                    class="conversations-search-input"
                                />
                            </div>

                            <div class="conversations-list" id="conversationsList"></div>
                        </div>

                        <!-- CENTER PANEL - Chat Window -->
                        <div class="chat-panel">
                            <!-- Chat Header -->
                            <div class="chat-header" id="chatHeader"></div>

                            <!-- Messages Area -->
                            <div class="messages-area" id="messagesArea"></div>

                            <!-- Message Input -->
                            <div class="message-input-section">
                                <div class="message-input-wrapper">
                                    <textarea
                                        id="messageInput"
                                        placeholder="Type a message..."
                                        class="message-textarea"
                                        rows="1"
                                    ></textarea>
                                    <div class="message-input-actions">
                                        <button class="input-action-btn" title="Attach file">
                                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 0 19.8 4.3M22 12.5a10 10 0 0 0-19.8-4.2"></path>
                                            </svg>
                                        </button>
                                        <button class="input-action-btn" title="Emoji">
                                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="12" r="10"></circle>
                                                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                                <line x1="15" y1="9" x2="15.01" y2="9"></line>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <button class="send-btn" id="sendBtn">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                    Send
                                </button>
                            </div>
                        </div>

                        <!-- RIGHT PANEL - Project Context -->
                        <div class="project-context-panel">
                            <div class="context-header">
                                <h3 class="context-title">Project Context</h3>
                                <p class="context-subtitle">Related project information</p>
                            </div>

                            <div class="context-details" id="contextDetails"></div>

                            <div class="context-actions">
                                <button class="context-action-btn workroom">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                    </svg>
                                    Open Workroom
                                </button>
                                <button class="context-action-btn">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 2H5a2 2 0 0 0-2 2v4m0 0v10a2 2 0 0 0 2 2h4m0 0h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-4m0 0v4"></path>
                                    </svg>
                                    View Milestones
                                </button>
                                <button class="context-action-btn">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                        <line x1="12" y1="19" x2="12" y2="5"></line>
                                        <line x1="9" y1="12" x2="15" y2="12"></line>
                                    </svg>
                                    Review Deliverable
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="messages.js"></script>
</body>
</html>
