<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milestone Reports</title>
  <link rel="stylesheet" href="milestone-reports.css">
</head>
<body>
  <div class="dashboard-layout">
    <main class="main-content">
      <div class="space-y-6">
        <!-- Header -->
        <div class="header-section">
          <div class="header-content">
            <div class="header-top">
              <button class="back-button" id="backBtn" aria-label="Go back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
              </button>
              <h1 class="page-title">Milestone Reports</h1>
            </div>
            <p class="page-subtitle">View and manage technical audit and dispute resolution reports.</p>
          </div>
        </div>

        <!-- Filters -->
        <div class="filters-card">
          <div class="filters-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
            <h2 class="filters-title">Filters</h2>
          </div>

          <div class="filters-grid">
            <!-- Milestone Filter -->
            <div class="filter-group">
              <label class="filter-label">Milestone</label>
              <div class="select-wrapper">
                <select id="milestoneFilter" class="filter-select">
                  <option value="all">All Milestones</option>
                  <option value="Database Schema & Migration">Database Schema & Migration</option>
                  <option value="Payment Gateway Integration">Payment Gateway Integration</option>
                  <option value="Backend API Development">Backend API Development</option>
                  <option value="Authentication System">Authentication System</option>
                </select>
                <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>

            <!-- Report Type Filter -->
            <div class="filter-group">
              <label class="filter-label">Report Type</label>
              <div class="select-wrapper">
                <select id="reportTypeFilter" class="filter-select">
                  <option value="all">All Types</option>
                  <option value="technical-audit">Technical Audit Report</option>
                  <option value="dispute-resolution">Dispute Resolution Report</option>
                </select>
                <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>

            <!-- Date Range Filter -->
            <div class="filter-group">
              <label class="filter-label">Date Range</label>
              <div class="select-wrapper">
                <select id="dateRangeFilter" class="filter-select">
                  <option value="all">All Time</option>
                  <option value="last-7-days">Last 7 Days</option>
                  <option value="last-30-days">Last 30 Days</option>
                  <option value="last-90-days">Last 90 Days</option>
                </select>
                <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Reports List -->
        <div class="reports-section">
          <div class="reports-header">
            <h2 class="reports-title">Reports (<span id="reportCount">4</span>)</h2>
          </div>

          <div class="reports-container" id="reportsContainer">
            <!-- Reports will be populated by JavaScript -->
          </div>

          <!-- Empty State -->
          <div class="empty-state hidden" id="emptyState">
            <div class="empty-state-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                <polyline points="13 2 13 9 20 9"/>
              </svg>
            </div>
            <h3 class="empty-state-title">No reports found</h3>
            <p class="empty-state-text">Try adjusting your filters to see more results.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="milestone-reports.js"></script>
</body>
</html>
