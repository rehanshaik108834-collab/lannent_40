<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Deliverable — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .review-layout { display:grid; grid-template-columns:1fr 320px; gap:20px; }
    .file-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
    .file-row:last-child { border-bottom:none; }
    .file-icon-wrap { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .checklist-item { display:flex; align-items:center; gap:12px; padding:10px; border-radius:10px; cursor:pointer; transition:background 0.15s; margin-bottom:4px; }
    .checklist-item:hover { background:var(--input-bg); }
    .check-box { width:20px; height:20px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s, border-color 0.15s; cursor:pointer; }
    .check-box.checked { background:#6366f1; border-color:#6366f1; }
    @media(max-width:900px){ .review-layout{ grid-template-columns:1fr; } }
  </style>
  <script>
    const checklistItems = [
      { id:1, label:'Code meets project requirements',     checked:false },
      { id:2, label:'Documentation is complete and clear', checked:false },
      { id:3, label:'Design files are properly organized', checked:false },
      { id:4, label:'All files are accessible and working',checked:false },
      { id:5, label:'Quality standards are met',           checked:false },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('client', 'expert')) return;
      const session = Auth.getCurrentUser();
      const params = new URLSearchParams(window.location.search);
      const milestoneId = params.get('milestoneId') || params.get('id');
      const role = params.get('role') || 'client';

      // Load milestone from Store
      let milestone = milestoneId ? Store.getMilestoneById(milestoneId) : null;
      // Fallback: find first submitted milestone for client's tasks
      if (!milestone) {
        const tasks = Store.getTasksByClient(session.userId);
        for (const t of tasks) {
          const ms = Store.getMilestonesByTask(t.id).find(m => m.status === 'submitted' || m.status === 'review');
          if (ms) { milestone = ms; break; }
        }
      }

      if (!milestone) {
        document.body.innerHTML = '<div style="padding:80px;text-align:center;color:#6b7280;font-size:16px;">No deliverable pending review. <a href="client-my-projects.html" style="color:#6366f1;">Go to Projects</a></div>';
        return;
      }

      const task = Store.getTaskById(milestone.taskId);
      const worker = milestone.workerId ? Store.getUserById(milestone.workerId) : null;
      const deliverable = {
        project: task ? task.title : 'Unknown Project',
        milestone: milestone.title,
        worker: worker ? worker.name : 'Gig Worker',
        workerAvatar: worker ? worker.avatar : 'GW',
        workerColor: worker ? worker.avatarColor : 'linear-gradient(135deg,#6366f1,#4f46e5)',
        workerId: milestone.workerId || 'u2',
        submittedDate: milestone.submittedAt ? new Date(milestone.submittedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Recently submitted',
        budget: milestone.budget || 0,
        id: milestone.id,
        deliverable: milestone.deliverable || null
      };

      function renderChecklist() {
        return checklistItems.map(item => `
          <div class="checklist-item" onclick="toggleCheck(${item.id})">
            <div class="check-box${item.checked ? ' checked' : ''}" id="chkBox${item.id}">
              ${item.checked ? '<i data-lucide="check" style="width:12px;height:12px;color:white;"></i>' : ''}
            </div>
            <span style="font-size:14px;${item.checked ? 'text-decoration:line-through;color:var(--muted-foreground);' : ''}">${item.label}</span>
          </div>`).join('');
      }

      function updateActionButtons() {
        const allChecked = checklistItems.every(i => i.checked);
        const approveBtn = document.getElementById('approveBtn');
        if (approveBtn) {
          approveBtn.style.opacity = allChecked ? '1' : '0.6';
          approveBtn.title = allChecked ? '' : 'Complete the checklist to approve';
        }
      }

      const notesHtml = deliverable.deliverable && deliverable.deliverable.description
        ? `<div style="background:var(--input-bg);border-radius:12px;padding:16px;font-size:14px;color:#374151;line-height:1.7;">${deliverable.deliverable.description}</div>`
        : `<div style="background:var(--input-bg);border-radius:12px;padding:16px;font-size:14px;color:#374151;line-height:1.7;">
            <p style="margin-bottom:12px;"><strong>Deliverable submitted</strong> for review.</p>
            <p>Worker has submitted work for this milestone. Review the files and checklist before approving.</p>
          </div>`;

      const filesHtml = deliverable.deliverable && deliverable.deliverable.files && deliverable.deliverable.files.length
        ? deliverable.deliverable.files.map(f => `
            <div class="file-row">
              <div class="file-icon-wrap" style="background:#eef2ff;">
                <i data-lucide="file" style="width:18px;height:18px;color:#6366f1;"></i>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f}</div>
                <div style="font-size:12px;color:var(--muted-foreground);">Submitted file</div>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn-sm" title="Download"><i data-lucide="download" style="width:14px;height:14px;"></i></button>
              </div>
            </div>`).join('')
        : `<div style="padding:24px;text-align:center;color:var(--muted-foreground);">
             <i data-lucide="file-x" style="width:32px;height:32px;opacity:0.4;margin:0 auto 8px;display:block;"></i>
             <div style="font-size:13px;">No files attached to this submission.</div>
           </div>`;

      const content = `
        <div style="margin-bottom:16px;">
          <a href="${role === 'expert' ? 'expert-audit-requests.html' : 'client-my-projects.html'}" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted-foreground);transition:color 0.15s;" onmouseenter="this.style.color='var(--foreground)'" onmouseleave="this.style.color='var(--muted-foreground)'">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to ${role === 'expert' ? 'Audit Requests' : 'Projects'}
          </a>
        </div>

        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
          <div style="display:flex;align-items:center;gap:14px;">
            <div style="width:48px;height:48px;border-radius:50%;background:${deliverable.workerColor};display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700;">${deliverable.workerAvatar}</div>
            <div>
              <div style="font-weight:600;font-size:16px;">${deliverable.worker}</div>
              <div style="font-size:13px;color:var(--muted-foreground);">Submitted ${deliverable.submittedDate}</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;">
            <div style="text-align:center;padding:12px 20px;border-radius:12px;background:#ecfdf5;">
              <div style="font-weight:700;color:#10b981;font-size:18px;">$${deliverable.budget.toLocaleString()}</div>
              <div style="font-size:11px;color:#065f46;">Milestone Value</div>
            </div>
            <span class="badge badge-orange" style="font-size:13px;padding:8px 16px;">Pending Review</span>
          </div>
        </div>

        <div class="review-layout">
          <div>
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
              <h3 style="font-size:15px;font-weight:600;margin-bottom:4px;">Submitted Files</h3>
              <div style="font-size:13px;color:var(--muted-foreground);margin-bottom:16px;">${deliverable.project} · ${deliverable.milestone}</div>
              ${filesHtml}
            </div>

            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
              <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Worker's Notes</h3>
              ${notesHtml}
            </div>

            ${role === 'client' ? `
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
              <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Your Review Comments</h3>
              <textarea class="form-input" id="reviewComments" rows="4" placeholder="Add your feedback, questions, or specific revision requests here..."></textarea>
              <div id="commentsErr" style="font-size:12px;color:#ef4444;margin-top:4px;display:none;"></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
              <button id="approveBtn" onclick="handleApprove()" class="btn-primary" style="padding:12px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);opacity:0.6;">
                <i data-lucide="check-circle" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:6px;"></i>Approve & Release
              </button>
              <button onclick="handleRequestChanges()" class="btn-outline" style="padding:12px;border-radius:12px;border-color:#f59e0b;color:#d97706;">
                <i data-lucide="refresh-cw" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:6px;"></i>Request Changes
              </button>
              <button onclick="handleDispute()" class="btn-outline" style="padding:12px;border-radius:12px;border-color:#ef4444;color:#ef4444;">
                <i data-lucide="alert-triangle" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:6px;"></i>Raise Dispute
              </button>
            </div>` : `
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
              <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Expert Action</h3>
              <p style="font-size:14px;color:var(--muted-foreground);margin-bottom:20px;">After reviewing the checklist and files, submit your final audit report.</p>
              <button onclick="window.location.href='expert-report-audit.html?id=${params.get('auditId')}'" class="btn-primary" style="padding:12px 24px;border-radius:12px;width:100%;">
                <i data-lucide="clipboard-check" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:6px;"></i>Submit Audit Report
              </button>
            </div>`}
          </div>

          <div>
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;position:sticky;top:80px;">
              <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;">Review Checklist</h3>
              <div id="checklistContainer">${renderChecklist()}</div>
              <div style="margin-top:16px;padding:12px;border-radius:12px;background:var(--input-bg);text-align:center;">
                <span id="checkCount" style="font-size:13px;font-weight:600;color:#6366f1;">0/${checklistItems.length} items checked</span>
              </div>
            </div>
            <div style="background:linear-gradient(145deg,#fff7ed,#ffedd5);border:1.5px solid #fed7aa;border-radius:16px;padding:20px;">
              <h3 style="font-size:14px;font-weight:600;color:#c2410c;margin-bottom:12px;">⚠ Before Approving</h3>
              <p style="font-size:13px;color:#7c2d12;line-height:1.6;">${role === 'expert' ? 'Submitting the report will finalize this audit and append the results back to the associated project escrow automatically.' : `Approving will release <strong>$${deliverable.budget.toLocaleString()}</strong> from escrow to ${deliverable.worker}. This action cannot be undone.`}</p>
            </div>
          </div>
        </div>

        <!-- Confirm modal -->
        <div id="confirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);">
          <div style="background:white;border-radius:24px;padding:32px;width:100%;max-width:400px;margin:0 16px;box-shadow:0 32px 80px rgba(0,0,0,0.15);text-align:center;">
            <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;">✓</div>
            <h2 style="font-size:20px;font-weight:600;margin-bottom:8px;">Confirm Release</h2>
            <p style="font-size:14px;color:var(--muted-foreground);margin-bottom:20px;">Release <strong>$${deliverable.budget.toLocaleString()}</strong> from escrow to <strong>${deliverable.worker}</strong>? This cannot be undone.</p>
            <div style="display:flex;gap:12px;">
              <button onclick="document.getElementById('confirmModal').style.display='none'" class="btn-outline" style="flex:1;padding:12px;border-radius:12px;">Cancel</button>
              <button onclick="confirmRelease()" class="btn-primary" style="flex:1;padding:12px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);">Release Funds</button>
            </div>
          </div>
        </div>`;

      initDashboard({ role: role, activePath: role === 'expert' ? 'expert-audit-requests.html' : 'client-my-projects.html', pageTitle:'Review Deliverable', pageSubtitle: deliverable.milestone, content });
      lucide.createIcons();
      updateActionButtons();

      window.toggleCheck = function(id) {
        const item = checklistItems.find(i => i.id === id);
        if (!item) return;
        item.checked = !item.checked;
        const box = document.getElementById('chkBox' + id);
        if (box) { box.className = 'check-box' + (item.checked?' checked':''); box.innerHTML = item.checked ? '<i data-lucide="check" style="width:12px;height:12px;color:white;"></i>' : ''; lucide.createIcons(); }
        const count = document.getElementById('checkCount');
        const checked = checklistItems.filter(i=>i.checked).length;
        if (count) count.textContent = `${checked}/${checklistItems.length} items checked`;
        updateActionButtons();
      };

      window.handleApprove = function() {
        const allChecked = checklistItems.every(i => i.checked);
        if (!allChecked) { Validate.toast('Please complete the checklist before approving.', 'error'); return; }
        document.getElementById('confirmModal').style.display = 'flex';
      };

      window.confirmRelease = function() {
        document.getElementById('confirmModal').style.display = 'none';
        try {
          Store.approveDeliverable(milestone.id);
          Store.addNotification({ userId: deliverable.workerId, type:'payment', text:`$${deliverable.budget.toLocaleString()} released from escrow`, subtext: deliverable.milestone + ' approved · just now', read:false });
        } catch(e) { console.warn('Store error:', e); }
        Validate.toast('✓ $' + deliverable.budget.toLocaleString() + ' released to ' + deliverable.worker, 'success');
        setTimeout(() => window.location.href = 'client-my-projects.html', 2000);
      };

      window.handleRequestChanges = function() {
        const comments = document.getElementById('reviewComments')?.value?.trim();
        const errEl = document.getElementById('commentsErr');
        if (!comments) { errEl.textContent='Please add revision comments before requesting changes.'; errEl.style.display='block'; document.getElementById('reviewComments').style.borderColor='#ef4444'; return; }
        errEl.style.display='none'; document.getElementById('reviewComments').style.borderColor='';
        try { Store.updateMilestone(milestone.id, { status:'todo' }); } catch(e){}
        Validate.toast('Revision request sent to ' + deliverable.worker, 'success');
        setTimeout(() => window.location.href = 'client-my-projects.html', 1800);
      };

      window.handleDispute = function() {
        // Store milestone + project info so dispute page can display it
        try {
          localStorage.setItem('disputeTargetMilestone', JSON.stringify({
            id: milestone.id,
            taskId: milestone.taskId,
            title: milestone.title,
            amount: milestone.budget || 0,
            project: task ? task.title : 'Unknown Project',
            workerId: deliverable.workerId,
            workerName: deliverable.worker,
          }));
        } catch(e) {
          console.warn('Could not set disputeTargetMilestone in localStorage', e);
        }
        window.location.href = 'dispute.html';
      };
    });
  </script>
</head>
<body></body>
</html>
