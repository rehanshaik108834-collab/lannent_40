<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raise Dispute — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .dispute-form { max-width:720px; margin:0 auto; }
    .field-group { margin-bottom:16px; }
    .field-group label { font-size:13px; font-weight:600; display:block; margin-bottom:6px; }
    .field-input, .field-textarea, .field-select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--secondary); font-size:14px; font-family:inherit; }
    .field-textarea { min-height:120px; resize:vertical; }
    .btn-action { margin-right:12px; }
  </style>
</head>
<body>
<script>
  function showToast(msg, type='success') {
    const t = document.createElement('div');
    const bg = type === 'success' ? '#10b981' : type === 'warn' ? '#f59e0b' : '#ef4444';
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:white;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.2);`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }

  function submitDispute() {
    let target;
    try {
      target = JSON.parse(localStorage.getItem('disputeTargetMilestone') || 'null');
    } catch (e) {
      console.warn('Could not get disputeTargetMilestone from localStorage', e);
      showToast('No milestone selected for dispute.', 'warn');
      return;
    }
    if (!target) {
      showToast('No milestone selected for dispute.', 'warn');
      return;
    }

    const reason = document.getElementById('disputeReason').value.trim();
    const details = document.getElementById('disputeDetails').value.trim();
    const outcome = document.getElementById('disputeOutcome').value.trim();
    if (!reason || !details || !outcome) {
      showToast('Please complete all dispute fields.', 'warn');
      return;
    }

    const session = Auth.getCurrentUser();
    const taskIdFromTarget = target.taskId || null;
    const task = taskIdFromTarget ? Store.getTaskById(taskIdFromTarget) : Store.getMilestoneById(target.id)?.taskId ? Store.getTaskById(Store.getMilestoneById(target.id).taskId) : null;
    const workerId = target.workerId || (task ? task.workerId : null);
    const worker = workerId ? Store.getUserById(workerId) : null;

    const disputeData = {
      taskId: task?.id || target.taskId || null,
      milestoneId: target.id,
      project: task ? task.title : target.project || target.title || 'Project',
      milestone: target.title || target.milestone || 'Milestone',
      amount: target.amount ? (typeof target.amount === 'number' ? '$' + target.amount.toLocaleString() : target.amount) : '$0',
      reason,
      details,
      outcome,
      raisedBy: session?.userId || null,
      raisedByName: session?.name || session?.email || 'Client',
      againstId: worker ? worker.id : target.workerId || null,
      againstName: worker ? worker.name : target.workerName || target.worker || 'Worker',
      status: 'open'
    };

    try {
      Store.createDispute(disputeData);

      // Notify all expert reviewers about the new dispute
      const allUsers = Store.getUsers();
      const experts = allUsers.filter(u => u.role === 'expert' && u.status === 'active');
      experts.forEach(expert => {
        Store.addNotification({
          userId: expert.id,
          type: 'dispute',
          text: `New dispute raised: ${disputeData.project}`,
          subtext: `${disputeData.raisedByName} raised a dispute — ${disputeData.reason}`,
        });
      });

      // Also notify the worker being disputed
      if (disputeData.againstId) {
        Store.addNotification({
          userId: disputeData.againstId,
          type: 'dispute',
          text: `A dispute has been raised against you`,
          subtext: `${disputeData.project} — ${disputeData.milestone}: ${disputeData.reason}`,
        });
      }

      showToast('Dispute submitted successfully.', 'success');
      const redirectTaskId = disputeData.taskId ? `?id=${disputeData.taskId}` : '';
      setTimeout(() => { window.location.href = `project-milestone-board.html${redirectTaskId}`; }, 1300);
    } catch (e) {
      console.error('Dispute submit error:', e);
      showToast('Unable to submit dispute. Please try again.', 'error');
    }
  }

  function initDisputeForm() {
    let target;
    try {
      target = JSON.parse(localStorage.getItem('disputeTargetMilestone') || 'null');
    } catch (e) {
      console.warn('Could not get disputeTargetMilestone from localStorage', e);
      target = null;
    }
    const session = Auth.getCurrentUser();
    const userRole = session?.role || 'client';
    const workroomURL = userRole === 'worker' ? 'worker-workroom.html' : 'project-workroom.html';

    if (!target) {
      document.getElementById('disputeBody').innerHTML = `<div style="padding:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;text-align:center;">No dispute target found. Return to your <a href="${workroomURL}">workroom</a>.</div>`;
      return;
    }
    document.getElementById('disputeMilestoneField').textContent = target.title;
    document.getElementById('disputeAmountField').textContent = target.amount || '$0';
  }

  document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('client', 'worker')) return;
    const session = Auth.getCurrentUser();
    const userRole = session?.role || 'client';
    const workroomURL = userRole === 'worker' ? 'worker-workroom.html' : 'project-workroom.html';

    initDashboard({
      role: userRole,
      activePath: userRole === 'worker' ? 'worker-my-projects.html' : 'client-my-projects.html',
      pageTitle: 'Raise Dispute',
      pageSubtitle: 'Dispute details',
      content: `
        <div class="dispute-form" style="padding:20px;margin:0 auto;max-width:800px;">
          <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;">
            <h2 style="font-size:18px;margin-bottom:10px;">Dispute Milestone</h2>
            <p style="margin-bottom:18px;color:var(--muted-foreground);">Provide details to raise a dispute for the selected milestone.</p>

            <div class="field-group"><label>Milestone</label><div id="disputeMilestoneField" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--secondary);font-weight:600;"></div></div>
            <div class="field-group"><label>Amount</label><div id="disputeAmountField" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--secondary);font-weight:600;"></div></div>
            <div class="field-group"><label for="disputeReason">Reason</label><select id="disputeReason" class="field-select"><option value="">Select reason</option><option value="Incomplete work">Incomplete work</option><option value="Quality issues">Quality issues</option><option value="Scope mismatch">Scope mismatch</option><option value="Missed deadline">Missed deadline</option><option value="Other">Other</option></select></div>
            <div class="field-group"><label for="disputeDetails">Details</label><textarea id="disputeDetails" class="field-textarea" placeholder="Describe what is wrong and what you'd like changed"></textarea></div>
            <div class="field-group"><label for="disputeOutcome">Desired outcome</label><input id="disputeOutcome" class="field-input" placeholder="E.g., revision, partial refund, cancellation" /></div>

            <div style="display:flex;gap:10px;margin-top:14px;">
              <button class="btn-primary btn-action" onclick="submitDispute()">Submit Dispute</button>
              <a href="${workroomURL}" class="btn-outline btn-action">Back to Workroom</a>
            </div>
          </div>
        </div>`
    });
    initDisputeForm();
    lucide.createIcons();
  });
</script>
</body>
</html>
