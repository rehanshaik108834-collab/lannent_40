<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milestone Board — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .kanban-board { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start; }
    .kanban-col { border-radius:16px; background:var(--input-bg); padding:16px; min-height:360px; }
    .kanban-col-header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .kanban-col-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
    .kanban-count { margin-left:auto; min-width:22px; height:22px; border-radius:11px; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 6px; }
    .kanban-card { background:white; border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:10px; cursor:pointer; transition:box-shadow 0.2s,transform 0.2s; }
    .kanban-card:hover { box-shadow:0 8px 24px rgba(0,0,0,0.1); transform:translateY(-2px); }
    @media(max-width:1024px){ .kanban-board{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:640px){ .kanban-board{ grid-template-columns:1fr; } }
  </style>
  <script>
    // ── Store-backed worker milestone board ──────────────────
    const prioColors = { High:'#ef4444', Medium:'#f59e0b', Low:'#10b981', Normal:'#6366f1' };

    function loadWorkerMilestones(taskId) {
      const session = (typeof Auth !== 'undefined') ? Auth.getCurrentUser() : null;
      if (!session) return { todo:[], inprogress:[], review:[], done:[] };
      const workerTasks = taskId ? [Store.getTaskById(taskId)].filter(Boolean) : Store.getTasksByWorker(session.userId);
      const colMap = { todo:[], inprogress:[], review:[], done:[] };
      workerTasks.forEach(t => {
        const ms = Store.getMilestonesByTask(t.id);
        ms.forEach(m => {
          const card = {
            id: m.id, rawId: m.id, taskId: m.taskId,
            title: m.title, desc: m.description || '',
            amount: '$'+(m.budget||0).toLocaleString(),
            due: m.dueDate ? new Date(m.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—',
            assignee: session.avatar || 'AW', assigneeColor: session.avatarColor || 'linear-gradient(135deg,#10b981,#059669)',
            priority: m.priority || 'Medium', progress: m.progress || 0, status: m.status || 'todo'
          };
          if (m.status === 'done' || m.status === 'approved' || m.status === 'completed' || m.status === 'audit-passed') colMap.done.push(card);
          else if (m.status === 'review' || m.status === 'submitted') colMap.review.push(card);
          else if (m.status === 'in-progress') colMap.inprogress.push(card);
          else colMap.todo.push(card);
        });
      });
      return colMap;
    }


    function renderCard(m, col) {
      const isReview  = col === 'review';
      const isDone    = col === 'done';
      const pc = { High:'#ef4444', Medium:'#f59e0b', Low:'#10b981' }[m.priority] || '#6366f1';
      return `
        <div class="kanban-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
            <div class="card-title" style="flex:1;margin-bottom:0;">${m.title}</div>
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px;margin-left:8px;background:${pc}20;color:${pc};white-space:nowrap;">${m.priority}</span>
          </div>
          <p style="font-size:12px;color:var(--muted-foreground);line-height:1.5;margin-bottom:10px;">${m.desc}</p>
          ${m.progress ? `
            <div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;">
                <span style="color:var(--muted-foreground);">Progress</span>
                <span style="font-weight:700;color:#10b981;">${m.progress}%</span>
              </div>
              <div style="height:5px;border-radius:9999px;background:var(--muted);overflow:hidden;">
                <div style="height:100%;border-radius:9999px;background:linear-gradient(90deg,#10b981,#059669);width:${m.progress}%;"></div>
              </div>
            </div>` : ''}
          <div class="card-footer">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:26px;height:26px;border-radius:50%;background:${m.assigneeColor};display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;">${m.assignee}</div>
              <div class="card-meta" style="margin-bottom:0;">
                <i data-lucide="clock" style="width:11px;height:11px;"></i>
                ${m.due}
              </div>
            </div>
            <span class="card-amount">${m.amount}</span>
          </div>
          ${isDone ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.05);text-align:center;"><span style="font-size:12px;color:#10b981;font-weight:600;">✓ Completed</span></div>` : ''}
          ${isReview ? `<div style="margin-top:10px;padding:8px;border-radius:8px;background:#fef9c3;border:1px solid #fde68a;text-align:center;">
            <span style="font-size:12px;font-weight:600;color:#92400e;">⏳ Awaiting Client Review</span>
          </div>` : col === 'inprogress' ? `<div style="margin-top:10px;">
            <button onclick="event.stopPropagation();submitDeliverable('${m.rawId}','${m.taskId}')" style="width:100%;padding:7px;border-radius:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;font-size:12px;font-weight:600;cursor:pointer;">
              <i data-lucide="send" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:4px;"></i>Submit Deliverable
            </button>
          </div>` : col === 'todo' ? `<div style="margin-top:10px;">
            <button onclick="event.stopPropagation();startWorking('${m.rawId}')" style="width:100%;padding:7px;border-radius:8px;background:#eef2ff;color:#4f46e5;border:none;font-size:12px;font-weight:600;cursor:pointer;">
              Start Working
            </button>
          </div>` : ''}
        </div>`;
    }

    function renderKanbanBoard(taskId) {
      const milestones = loadWorkerMilestones(taskId);
      const allMs = [...milestones.todo,...milestones.inprogress,...milestones.review,...milestones.done];
      if (allMs.length === 0) {
        return `<div style="grid-column:1/-1;padding:64px;text-align:center;color:var(--muted-foreground);background:var(--card);border:1px solid var(--border);border-radius:16px;"><i data-lucide="flag" style="width:48px;height:48px;opacity:0.3;margin:0 auto 16px;display:block;"></i><div style="font-size:16px;font-weight:600;margin-bottom:6px;">No milestones yet</div><div style="font-size:14px;">Milestones will appear once clients assign them to you.</div></div>`;
      }
      return `
        <div class="kanban-col">
          <div class="kanban-col-header">
            <div style="width:10px;height:10px;border-radius:50%;background:#94a3b8;"></div>
            <span class="kanban-col-title" style="color:#64748b;">To Do</span>
            <span class="kanban-count" style="background:#f1f5f9;color:#64748b;">${milestones.todo.length}</span>
          </div>
          ${milestones.todo.map(m => renderCard(m, 'todo')).join('')}
        </div>
        <div class="kanban-col" style="background:#eef2ff;">
          <div class="kanban-col-header">
            <div style="width:10px;height:10px;border-radius:50%;background:#6366f1;animation:pulse 2s infinite;"></div>
            <span class="kanban-col-title" style="color:#6366f1;">In Progress</span>
            <span class="kanban-count" style="background:#e0e7ff;color:#4f46e5;">${milestones.inprogress.length}</span>
          </div>
          ${milestones.inprogress.map(m => renderCard(m, 'inprogress')).join('')}
        </div>
        <div class="kanban-col" style="background:#fffbeb;">
          <div class="kanban-col-header">
            <div style="width:10px;height:10px;border-radius:50%;background:#f59e0b;"></div>
            <span class="kanban-col-title" style="color:#d97706;">In Review</span>
            <span class="kanban-count" style="background:#fef9c3;color:#b45309;">${milestones.review.length}</span>
          </div>
          ${milestones.review.map(m => renderCard(m, 'review')).join('')}
        </div>
        <div class="kanban-col" style="background:#ecfdf5;">
          <div class="kanban-col-header">
            <div style="width:10px;height:10px;border-radius:50%;background:#10b981;"></div>
            <span class="kanban-col-title" style="color:#059669;">Done</span>
            <span class="kanban-count" style="background:#d1fae5;color:#065f46;">${milestones.done.length}</span>
          </div>
          ${milestones.done.map(m => renderCard(m, 'done')).join('')}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('worker')) return;
      const params = new URLSearchParams(window.location.search);
      const taskId = params.get('id');
      const task = taskId ? Store.getTaskById(taskId) : null;
      const taskTitle = task ? task.title : 'Milestone Board';
      const milestones = loadWorkerMilestones(taskId);
      const allMs = [...milestones.todo,...milestones.inprogress,...milestones.review,...milestones.done];
      const doneMs = milestones.done.length;
      const totalBudget = allMs.reduce((s,m)=>s+parseFloat((m.amount||'$0').replace(/[^0-9.]/g,'')||0),0);
      const earnedAmt = milestones.done.reduce((s,m)=>s+parseFloat((m.amount||'$0').replace(/[^0-9.]/g,'')||0),0);
      const escrowAmt = totalBudget - earnedAmt;
      const taskDeadline = task && task.deadline ? new Date(task.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
      const progressPct = allMs.length ? Math.round((doneMs/allMs.length)*100) : 0;
      const progressDone = doneMs + milestones.inprogress.length;
      const content = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
          <a href="worker-my-projects.html" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted-foreground);" onmouseenter="this.style.color='var(--foreground)'" onmouseleave="this.style.color='var(--muted-foreground)'">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> My Projects
          </a>
          <span style="color:var(--border);">›</span>
          <span style="font-size:14px;font-weight:500;">${taskTitle}</span>
          <span class="badge badge-blue" style="margin-left:auto;">In Progress</span>
          <a href="milestone-reports.html?role=worker&taskId=${taskId || ''}" style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--foreground);text-decoration:none;transition:background 0.15s;margin-left:10px;" onmouseenter="this.style.background='var(--secondary)'" onmouseleave="this.style.background='var(--card)'">
            <i data-lucide="file-text" style="width:14px;height:14px;"></i>Reports
          </a>
        </div>

        <!-- Summary cards -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
          <div class="stat-card"><div><div class="stat-val">${allMs.length}</div><div class="stat-label">Total Milestones</div></div><div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="flag" style="width:20px;height:20px;color:#6366f1;"></i></div></div>
          <div class="stat-card"><div><div class="stat-val" style="color:#10b981;">$${earnedAmt.toLocaleString()}</div><div class="stat-label">Earned so far</div></div><div class="stat-icon-wrap" style="background:#ecfdf5;"><i data-lucide="check-circle" style="width:20px;height:20px;color:#10b981;"></i></div></div>
          <div class="stat-card"><div><div class="stat-val" style="color:#6366f1;">$${escrowAmt.toLocaleString()}</div><div class="stat-label">In Escrow</div></div><div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="lock" style="width:20px;height:20px;color:#6366f1;"></i></div></div>
          <div class="stat-card"><div><div class="stat-val">${taskDeadline}</div><div class="stat-label">Final Deadline</div></div><div class="stat-icon-wrap" style="background:#fffbeb;"><i data-lucide="calendar" style="width:20px;height:20px;color:#f59e0b;"></i></div></div>
        </div>

        <!-- Overall progress -->
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:24px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span style="font-weight:600;font-size:15px;">Overall Progress</span>
            <div style="display:flex;align-items:center;gap:12px;">
              <span style="font-size:14px;font-weight:700;color:#6366f1;">${progressPct}%</span>
              <a href="worker-workroom.html?id=${taskId}" class="btn-outline" style="font-size:13px;padding:6px 14px;">
                <i data-lucide="message-square" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px;"></i>Workroom
              </a>
            </div>
          </div>
          <div style="height:10px;border-radius:9999px;background:var(--muted);overflow:hidden;">
            <div style="height:100%;border-radius:9999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:${progressPct}%;box-shadow:0 0 10px rgba(99,102,241,0.4);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted-foreground);">
            <span>${progressDone} of ${allMs.length} milestones in progress or done</span>
          </div>
        </div>

        <!-- Kanban -->
        <div class="kanban-board" id="kanbanContainer">
          ${renderKanbanBoard(taskId)}
        </div>
      `;

      function safeSetUserRole(value) {
      try {
        localStorage.setItem('userRole', value);
      } catch (err) {
        console.warn('localStorage unavailable, cannot set user role to', value);
      }
    }

    safeSetUserRole('worker');
    initDashboard({
        role: 'worker',
        activePath: 'worker-my-projects.html',
        pageTitle: 'Milestone Board',
        pageSubtitle: taskTitle,
        content
      });
      lucide.createIcons();
      window.openMilestoneDetail = () => {};
    });

    window.submitToClient = function(milestoneId, taskId) {
      window.location.href = 'submit-deliverable.html?milestoneId=' + milestoneId + (taskId ? '&taskId=' + taskId : '');
    };

    window.submitDeliverable = function(milestoneId, taskId) {
      window.location.href = 'submit-deliverable.html?milestoneId=' + milestoneId + (taskId ? '&taskId=' + taskId : '');
    };

    window.startWorking = function(milestoneId) {
      if (!milestoneId || typeof Store === 'undefined') return;
      const milestone = Store.getMilestoneById(milestoneId);
      if (!milestone) return;
      milestone.status = 'in-progress';
      Store.updateMilestone(milestoneId, milestone);
      location.reload();
    };
  </script>
</head>
<body></body>
</html>
